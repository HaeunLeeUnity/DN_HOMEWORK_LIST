<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>드래곤네스트 숙제 체크리스트</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">🐉</span>
          <div class="logo-text">
            <h1>Dragon Nest</h1>
            <p>숙제 체크리스트</p>
          </div>
        </div>
        <div class="header-actions">
          <div class="reset-timers">
            <div class="timer-card daily">
              <span class="timer-label">일일 초기화</span>
              <span class="timer-value" id="daily-timer">--:--:--</span>
            </div>
            <div class="timer-card weekly">
              <span class="timer-label">주간 초기화</span>
              <span class="timer-value" id="weekly-timer">--일 --:--:--</span>
            </div>
          </div>
          <button class="btn btn-icon" id="settings-btn" title="설정">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="app-main">
      <!-- Character Bar -->
      <section class="character-section">
        <div class="section-header">
          <h2>캐릭터</h2>
          <div style="display:flex;gap:8px">
            <button class="btn btn-add" id="add-char-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              캐릭터 추가
            </button>
            <button class="btn btn-edit-chars" id="edit-chars-btn" title="캐릭터 편집">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
              편집
            </button>
          </div>
        </div>
        <div class="character-tabs" id="character-tabs">
          <!-- JS로 렌더링 -->
        </div>
      </section>

      <!-- Task Board -->
      <div class="task-board" id="task-board">
        <!-- 일일 숙제 -->
        <section class="task-section daily-section">
          <div class="section-title-bar">
            <div class="section-title-left">
              <span class="section-badge daily-badge">일일</span>
              <h2>일일 숙제</h2>
              <span class="reset-note">매일 오전 9시 초기화</span>
            </div>
            <div class="section-progress" id="daily-progress">
              <span class="progress-text">0 / 0</span>
              <div class="progress-bar"><div class="progress-fill daily-fill" style="width:0%"></div></div>
            </div>
          </div>
          <div class="task-grid" id="daily-tasks">
            <!-- JS로 렌더링 -->
          </div>
        </section>

        <!-- 주간 숙제 -->
        <section class="task-section weekly-section">
          <div class="section-title-bar">
            <div class="section-title-left">
              <span class="section-badge weekly-badge">주간</span>
              <h2>주간 숙제</h2>
              <span class="reset-note">매주 토요일 오전 9시 초기화</span>
            </div>
            <div class="section-progress" id="weekly-progress">
              <span class="progress-text">0 / 0</span>
              <div class="progress-bar"><div class="progress-fill weekly-fill" style="width:0%"></div></div>
            </div>
          </div>
          <div class="task-grid" id="weekly-tasks">
            <!-- JS로 렌더링 -->
          </div>
        </section>
      </div>
    </main>
  </div>

  <!-- 캐릭터 추가 모달 -->
  <div class="modal-overlay" id="add-char-modal" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h3>캐릭터 추가</h3>
        <button class="btn btn-icon modal-close" data-modal="add-char-modal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>캐릭터 이름</label>
          <input type="text" id="new-char-name" placeholder="캐릭터 이름 입력" class="form-input" />
        </div>
        <div class="form-group">
          <label>직업</label>
          <div class="class-picker" id="class-picker">
            <button type="button" class="class-pick-btn" data-class="warrior">
              <img src="icons/Warrior_Class_Icon.webp" alt="워리어" />
              <span>워리어</span>
            </button>
            <button type="button" class="class-pick-btn" data-class="archer">
              <img src="icons/Archer_Class_Icon.webp" alt="아처" />
              <span>아처</span>
            </button>
            <button type="button" class="class-pick-btn" data-class="sorceress">
              <img src="icons/Sorceress_Class_Icon.webp" alt="소서리스" />
              <span>소서리스</span>
            </button>
            <button type="button" class="class-pick-btn" data-class="cleric">
              <img src="icons/Cleric_Class_Icon.webp" alt="클래릭" />
              <span>클래릭</span>
            </button>
            <button type="button" class="class-pick-btn" data-class="academic">
              <img src="icons/Tinkerer_Class_Icon.webp" alt="아카데믹" />
              <span>아카데믹</span>
            </button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" data-modal="add-char-modal">취소</button>
        <button class="btn btn-primary" id="confirm-add-char">추가</button>
      </div>
    </div>
  </div>

  <!-- 설정 패널 -->
  <div class="modal-overlay" id="settings-modal" style="display:none">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h3>숙제 설정</h3>
        <button class="btn btn-icon modal-close" data-modal="settings-modal">✕</button>
      </div>
      <div class="modal-body">
        <p class="settings-desc">캐릭터별로 수행할 숙제를 선택하세요. 비활성화된 숙제는 체크리스트에 표시되지 않습니다.</p>
        <div id="settings-char-tabs" class="settings-char-tabs"></div>
        <div id="settings-task-list" class="settings-task-list"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" data-modal="settings-modal">저장</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
